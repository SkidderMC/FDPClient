name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
          cache: gradle

      - name: Verify and build
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon setupCiWorkspace
          ./gradlew --no-daemon clean check build

      - uses: actions/upload-artifact@v4
        with:
          name: FDPClient-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error
