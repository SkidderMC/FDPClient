<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Spotify</title>
<style>
  :root {
    --green: #1ed760;
    --green-deep: #1db954;
    --text: #ffffff;
    --muted: #b3b3b3;
    --bg: #121212;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; width: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    color: var(--text);
    background: var(--bg);
    -webkit-user-select: none; user-select: none;
    -webkit-font-smoothing: antialiased;
  }

  /* ambient backdrop derived from the cover art */
  #ambient {
    position: fixed; top: -80px; right: -80px; bottom: -80px; left: -80px; z-index: 0;
    background-position: center; background-size: cover;
    filter: blur(70px) saturate(1.6) brightness(0.7);
    transform: scale(1.1);
    opacity: 0; transition: opacity 1s ease;
  }
  #ambient.on { opacity: 1; }
  #wash {
    position: fixed; top: 0; right: 0; bottom: 0; left: 0; z-index: 1;
    background:
      radial-gradient(120% 80% at 50% 0%, rgba(0,0,0,.15), rgba(0,0,0,.55) 60%, rgba(0,0,0,.85)),
      linear-gradient(180deg, rgba(18,18,18,.2), rgba(18,18,18,.9));
  }

  .stage { position: relative; z-index: 2; height: 100%; display: flex;
    align-items: center; justify-content: center; padding: 24px; }

  /* ---------- now playing ---------- */
  .player { width: 380px; max-width: 88vw; opacity: 0; transform: translateY(8px);
    transition: opacity .5s ease, transform .5s ease; }
  .player.show { opacity: 1; transform: none; }

  .context { display: flex; align-items: center; margin-bottom: 22px; }
  .context .badge { display: inline-flex; align-items: center;
    font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); font-weight: 700; }
  .context .badge .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green);
    box-shadow: 0 0 10px var(--green); margin-right: 7px; }

  .cover {
    position: relative; width: 100%; border-radius: 8px; overflow: hidden;
    background: linear-gradient(150deg, #3a3a44, #1a1a22 70%);
    box-shadow: 0 18px 60px rgba(0,0,0,.6); margin-bottom: 26px;
  }
  /* square via padding hack (chrome75-safe, no aspect-ratio) */
  .cover::before { content: ""; display: block; padding-top: 100%; }
  .cover > .inner { position: absolute; top: 0; right: 0; bottom: 0; left: 0; display: flex; align-items: center; justify-content: center; }
  .cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .cover .logo { width: 38%; height: 38%; opacity: .9; }
  .cover .logo svg { width: 100%; height: 100%; display: block; }

  .meta { margin-bottom: 18px; }
  .title { font-size: 26px; font-weight: 700; line-height: 1.15; letter-spacing: -.01em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .artist { font-size: 15px; color: var(--muted); margin-top: 6px; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .seek { display: flex; align-items: center; margin-bottom: 14px; }
  .seek .time { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; min-width: 34px; }
  .seek .time.end { text-align: right; }
  .bar { position: relative; flex: 1; height: 4px; border-radius: 2px; margin: 0 10px;
    background: rgba(255,255,255,.28); overflow: hidden; }
  .bar .fill { position: absolute; left: 0; top: 0; bottom: 0; width: 0%;
    background: #fff; border-radius: 2px; transition: width .25s linear; }

  .controls { display: flex; align-items: center; justify-content: center; }
  .controls > * + * { margin-left: 26px; }
  .ctl { background: none; border: none; color: var(--muted); cursor: pointer; padding: 4px;
    display: flex; align-items: center; justify-content: center;
    transition: color .15s ease, transform .15s ease; }
  .ctl svg { width: 22px; height: 22px; fill: currentColor; }
  .ctl.side { color: #fff; }
  .ctl.side:hover { transform: scale(1.12); }
  .ctl.side:active { transform: scale(.92); }
  .ctl.ghost { width: 18px; } /* shuffle/repeat: present but inert, like Spotify when unavailable */
  .ctl.ghost svg { width: 18px; height: 18px; }
  .ctl.ghost { cursor: default; }
  .play {
    width: 58px; height: 58px; border-radius: 50%; background: #fff; color: #000;
    border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: transform .12s ease; box-shadow: 0 6px 18px rgba(0,0,0,.35);
  }
  .play svg { width: 26px; height: 26px; fill: #000; }
  .play:hover { transform: scale(1.06); }
  .play:active { transform: scale(.95); }

  /* ---------- status (connecting / idle) ---------- */
  .status { display: none; flex-direction: column; align-items: center; text-align: center; }
  .status.show { display: flex; }
  .status .mark { width: 64px; height: 64px; margin-bottom: 22px; color: var(--green); }
  .status .mark svg { width: 100%; height: 100%; }
  .status.pulse .mark { animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: .55; transform: scale(.96); } 50% { opacity: 1; transform: scale(1); } }
  .status h1 { font-size: 19px; font-weight: 700; }
  .status p { font-size: 13px; color: var(--muted); margin-top: 8px; line-height: 1.5; max-width: 320px; }

  .hidden { display: none !important; }
</style>
</head>
<body>
  <div id="ambient"></div>
  <div id="wash"></div>

  <div class="stage">
    <!-- now playing -->
    <div id="player" class="player">
      <div class="context">
        <span class="badge"><span class="dot"></span><span id="ctx">Playing from Spotify</span></span>
      </div>
      <div class="cover">
        <div class="inner" id="coverInner">
          <span class="logo" id="coverLogo">
            <svg viewBox="0 0 168 168"><path fill="#1ed760" d="M84 0a84 84 0 1 0 0 168A84 84 0 0 0 84 0zm38.5 121.2a5.2 5.2 0 0 1-7.2 1.7c-19.6-12-44.3-14.7-73.4-8a5.2 5.2 0 1 1-2.3-10.2c31.8-7.3 59.1-4.2 81.1 9.3a5.2 5.2 0 0 1 1.8 7.2zm10.3-22.9a6.5 6.5 0 0 1-9 2.1c-22.4-13.8-56.6-17.8-83.1-9.7a6.5 6.5 0 1 1-3.8-12.4c30.3-9.2 68-4.7 93.7 11.1a6.5 6.5 0 0 1 2.2 8.9zm.9-23.8C107 59.1 64.6 57.7 39.6 65.3a7.8 7.8 0 1 1-4.5-14.9c28.7-8.7 75.5-7 105.3 10.7a7.8 7.8 0 0 1-8 13.4z"/></svg>
          </span>
        </div>
      </div>
      <div class="meta">
        <div class="title" id="title">—</div>
        <div class="artist" id="artist"></div>
      </div>
      <div class="seek">
        <span class="time" id="elapsed">0:00</span>
        <div class="bar"><div class="fill" id="fill"></div></div>
        <span class="time end" id="total">0:00</span>
      </div>
      <div class="controls">
        <span class="ctl ghost" title="Shuffle">
          <svg viewBox="0 0 24 24"><path d="M16 4l4 4-4 4V9h-2.6l-2.2 3 2.2 3H16v-3l4 4-4 4v-3h-3.7l-2.6-3.6L7 17H4v-2h2.3l2.6-3.6L6.3 8H4V6h3.4l2.2 3 2.2-3H16V4z"/></svg>
        </span>
        <button class="ctl side" id="prev" title="Previous">
          <svg viewBox="0 0 24 24"><path d="M7 6h2v12H7zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button class="play" id="playpause" title="Play / Pause">
          <svg id="ppIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="ctl side" id="next" title="Next">
          <svg viewBox="0 0 24 24"><path d="M15 6h2v12h-2zM5 6l8.5 6L5 18z"/></svg>
        </button>
        <span class="ctl ghost" title="Repeat">
          <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
        </span>
      </div>
    </div>

    <!-- connecting -->
    <div id="connecting" class="status pulse">
      <span class="mark"><svg viewBox="0 0 168 168"><path fill="currentColor" d="M84 0a84 84 0 1 0 0 168A84 84 0 0 0 84 0zm38.5 121.2a5.2 5.2 0 0 1-7.2 1.7c-19.6-12-44.3-14.7-73.4-8a5.2 5.2 0 1 1-2.3-10.2c31.8-7.3 59.1-4.2 81.1 9.3a5.2 5.2 0 0 1 1.8 7.2zm10.3-22.9a6.5 6.5 0 0 1-9 2.1c-22.4-13.8-56.6-17.8-83.1-9.7a6.5 6.5 0 1 1-3.8-12.4c30.3-9.2 68-4.7 93.7 11.1a6.5 6.5 0 0 1 2.2 8.9zm.9-23.8C107 59.1 64.6 57.7 39.6 65.3a7.8 7.8 0 1 1-4.5-14.9c28.7-8.7 75.5-7 105.3 10.7a7.8 7.8 0 0 1-8 13.4z"/></svg></span>
      <h1>Connecting to Spotify</h1>
      <p>Reading what you're playing from your system — no setup needed.</p>
    </div>

    <!-- idle -->
    <div id="idle" class="status">
      <span class="mark"><svg viewBox="0 0 168 168"><path fill="currentColor" d="M84 0a84 84 0 1 0 0 168A84 84 0 0 0 84 0zm38.5 121.2a5.2 5.2 0 0 1-7.2 1.7c-19.6-12-44.3-14.7-73.4-8a5.2 5.2 0 1 1-2.3-10.2c31.8-7.3 59.1-4.2 81.1 9.3a5.2 5.2 0 0 1 1.8 7.2zm10.3-22.9a6.5 6.5 0 0 1-9 2.1c-22.4-13.8-56.6-17.8-83.1-9.7a6.5 6.5 0 1 1-3.8-12.4c30.3-9.2 68-4.7 93.7 11.1a6.5 6.5 0 0 1 2.2 8.9zm.9-23.8C107 59.1 64.6 57.7 39.6 65.3a7.8 7.8 0 1 1-4.5-14.9c28.7-8.7 75.5-7 105.3 10.7a7.8 7.8 0 0 1-8 13.4z"/></svg></span>
      <h1>Nothing playing</h1>
      <p>Press play in Spotify (desktop or web) and it shows up here instantly.</p>
    </div>
  </div>

<script>
(function () {
  "use strict";
  var qs = new URLSearchParams(window.location.search);
  var portParam = qs.get("port");
  var API = (portParam ? "http://localhost:" + portParam : window.location.origin) + "/api/v1";

  var el = function (id) { return document.getElementById(id); };
  var ICON_PLAY = "M8 5v14l11-7z";
  var ICON_PAUSE = "M6 5h4v14H6zM14 5h4v14h-4z";

  var lastTrackId = "";
  var lastCover = "";
  var view = "";
  var st = { isPlaying: false, progressMs: 0, durationMs: 0, fetchedAt: 0 };

  function fmt(ms) {
    if (!ms || ms < 0) ms = 0;
    var s = Math.floor(ms / 1000);
    var m = Math.floor(s / 60);
    s = s % 60;
    return m + ":" + (s < 10 ? "0" + s : s);
  }

  function setView(name) {
    if (view === name) return;
    view = name;
    el("player").classList.toggle("show", name === "player");
    el("player").classList.toggle("hidden", name !== "player");
    el("connecting").classList.toggle("show", name === "connecting");
    el("idle").classList.toggle("show", name === "idle");
  }

  function setCover(url) {
    if (url === lastCover) return;
    lastCover = url;
    var inner = el("coverInner");
    var ambient = el("ambient");
    if (url) {
      inner.innerHTML = '<img alt="" />';
      inner.firstChild.src = url;
      ambient.style.backgroundImage = 'url("' + url + '")';
      ambient.classList.add("on");
    } else {
      inner.innerHTML = el("coverLogo") ? '' : '';
      inner.innerHTML = '<span class="logo"><svg viewBox="0 0 168 168"><path fill="#1ed760" d="M84 0a84 84 0 1 0 0 168A84 84 0 0 0 84 0zm38.5 121.2a5.2 5.2 0 0 1-7.2 1.7c-19.6-12-44.3-14.7-73.4-8a5.2 5.2 0 1 1-2.3-10.2c31.8-7.3 59.1-4.2 81.1 9.3a5.2 5.2 0 0 1 1.8 7.2zm10.3-22.9a6.5 6.5 0 0 1-9 2.1c-22.4-13.8-56.6-17.8-83.1-9.7a6.5 6.5 0 1 1-3.8-12.4c30.3-9.2 68-4.7 93.7 11.1a6.5 6.5 0 0 1 2.2 8.9zm.9-23.8C107 59.1 64.6 57.7 39.6 65.3a7.8 7.8 0 1 1-4.5-14.9c28.7-8.7 75.5-7 105.3 10.7a7.8 7.8 0 0 1-8 13.4z"/></svg></span>';
      ambient.classList.remove("on");
    }
  }

  function render(data) {
    var connected = data && data.connection === "CONNECTED";
    var track = data && data.track ? data.track : null;

    if (!connected) { setView("connecting"); return; }
    if (!track || !track.title) { setView("idle"); return; }

    setView("player");
    el("ctx").textContent = data.local ? "Playing from Spotify" : "Playing from Spotify";

    if (track.id !== lastTrackId || el("title").textContent !== track.title) {
      lastTrackId = track.id;
      el("title").textContent = track.title;
      el("artist").textContent = track.artists || "";
    }
    setCover(track.coverUrl || "");

    st.isPlaying = !!data.isPlaying;
    st.progressMs = data.progressMs || 0;
    st.durationMs = track.durationMs || 0;
    st.fetchedAt = Date.now();

    el("ppIcon").setAttribute("d", st.isPlaying ? ICON_PAUSE : ICON_PLAY);
    el("total").textContent = fmt(st.durationMs);
    paint();
  }

  function paint() {
    if (view !== "player") return;
    var elapsed = st.progressMs;
    if (st.isPlaying) elapsed += (Date.now() - st.fetchedAt);
    if (st.durationMs > 0 && elapsed > st.durationMs) elapsed = st.durationMs;
    var pct = st.durationMs > 0 ? (elapsed / st.durationMs) * 100 : 0;
    if (pct < 0) pct = 0; if (pct > 100) pct = 100;
    el("fill").style.width = pct + "%";
    el("elapsed").textContent = fmt(elapsed);
  }

  function poll() {
    fetch(API + "/client/spotify", { cache: "no-store" })
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (d) { if (d) render(d); })
      .catch(function () {});
  }

  function control(action) {
    fetch(API + "/client/spotify/control", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: action })
    }).catch(function () {});
    if (action === "playPause") {
      st.isPlaying = !st.isPlaying;
      st.fetchedAt = Date.now();
      el("ppIcon").setAttribute("d", st.isPlaying ? ICON_PAUSE : ICON_PLAY);
    }
    setTimeout(poll, 300);
  }

  el("playpause").addEventListener("click", function () { control("playPause"); });
  el("next").addEventListener("click", function () { control("next"); });
  el("prev").addEventListener("click", function () { control("previous"); });

  setView("connecting");
  poll();
  setInterval(poll, 1000);
  setInterval(paint, 250);
})();
</script>
</body>
</html>
